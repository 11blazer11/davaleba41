<!DOCTYPE html>
<html>
<head>
    <title>Main Page</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f0f2f5;
            text-align: center;
            padding-top: 100px;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            display: inline-block;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        a {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background: #f44336;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        a:hover {
            background: #d32f2f;
        }
    </style>

</head>
<body>

<div class="box">
    <h2>Main Page</h2>

    <p>Welcome, <b>{{ request.user.username }}</b></p>

    <p>You are logged in ✅</p>

    <a href="{% url 'logout' %}">Logout</a>
</div>

</body>
</html>
